<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A.D Nails</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* HEADER / LOGO */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:black;
  color:white;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

/* CAR PLACEHOLDER (NOT CHANGED) */
.car {
  height:120px;
  background:linear-gradient(to right, #111, #333);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* INFO SECTION */
.info {
  padding:15px;
  background:white;
}

/* CALENDAR */
#calendarApp {
  padding:10px;
}

#calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.headerDay {
  text-align:center;
  font-weight:bold;
  padding:5px;
}

.day {
  padding:12px;
  text-align:center;
  border-radius:8px;
  font-weight:bold;
  background:#ddd;
}

.available {
  background:#2ecc71;
  color:white;
  cursor:pointer;
}

.booked {
  background:#e74c3c;
  color:white;
  pointer-events:none;
}

.sunday {
  background:#999;
  color:white;
  pointer-events:none;
}

.past {
  background:#ccc;
  pointer-events:none;
}

.hidden {
  display:none;
}

/* BUTTON */
button, select {
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">A.D NAILS</div>
  <div>📞 WhatsApp Booking</div>
</div>

<div class="car">
🚗 Car Section (your original stays here)
</div>

<div class="info">
<h3>About A.D Nails</h3>
<p>Professional nail services. Book your appointment below.</p>
</div>

<div id="calendarApp">

  <div style="text-align:center;">
    <select id="monthSelect" onchange="changeMonth()">
      <option value="3">April</option>
      <option value="4">May</option>
      <option value="5">June</option>
    </select>

    <button onclick="toggleAvailable()">Available Only</button>
  </div>

  <div id="calendar"></div>
</div>

<script>
let showAvailableOnly = false;
let currentMonth = 3;

const TIMES = ["08-10","10-12","12-14","14-16","16-18"];
const monthDays = {3:30,4:31,5:30};

/* ONLY 13 AVAILABLE SPOTS PER MONTH */
let slots = {
  3: generateSlots(3),
  4: generateSlots(4),
  5: generateSlots(5)
};

function generateSlots(month){
  let result = {};
  let used = new Set();

  while(Object.keys(result).length < 13){
    let day = Math.floor(Math.random()*monthDays[month]) + 1;
    let date = new Date(2024, month, day);
    let weekday = date.getDay();

    if(weekday === 0) continue; // Sunday closed
    if(used.has(day)) continue;

    used.add(day);
    result[day] = TIMES[Math.floor(Math.random()*TIMES.length)];
  }

  return result;
}

function render(){
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  for(let d of days){
    let h = document.createElement("div");
    h.className="headerDay";
    h.innerText=d;
    cal.appendChild(h);
  }

  let first = new Date(2024,currentMonth,1).getDay();
  let offset = first===0?6:first-1;

  for(let i=0;i<offset;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let i=1;i<=monthDays[currentMonth];i++){

    let date = new Date(2024,currentMonth,i);
    let day = date.getDay();

    let div = document.createElement("div");
    div.className="day";
    div.innerText=i;

    let isPast = date < new Date();

    if(day === 0){
      div.classList.add("sunday");
    }
    else if(isPast){
      div.classList.add("past");
    }
    else if(slots[currentMonth][i]){
      div.classList.add("available");

      div.onclick = () => {
        let location = prompt("Enter location:");
        if(!location) location="N/A";

        let msg = `A.D Nails Booking:\nDate: ${i}\nTime: ${slots[currentMonth][i]}\nLocation: ${location}`;

        window.open("https://wa.me/XXXXXXXXXX?text="+encodeURIComponent(msg));
      };
    }
    else {
      div.classList.add("booked");
    }

    if(showAvailableOnly && !slots[currentMonth][i]){
      div.classList.add("hidden");
    }

    cal.appendChild(div);
  }
}

function changeMonth(){
  currentMonth = parseInt(document.getElementById("monthSelect").value);
  render();
}

function toggleAvailable(){
  showAvailableOnly = !showAvailableOnly;
  render();
}

render();
</script>

</body>
</html>
