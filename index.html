<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.D Nails Malta</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before, body::after {
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  border-radius:50%;
  filter:blur(120px);
  z-index:-1;
}
body::before { background:#ffb6d5; top:-100px; left:-100px; }
body::after { background:#c77dff; bottom:-100px; right:-100px; }

/* HEADER */
header {
  padding:70px 20px;
  background:linear-gradient(#ffb6d5,#ffe6f0);
}
h1 {color:#b30059;margin:0;}
.since {font-size:14px;}
.btn {
  margin-top:15px;
  display:inline-block;
  padding:12px 20px;
  background:#25D366;
  color:white;
  border-radius:10px;
  text-decoration:none;
}

/* ROAD + CAR (UNCHANGED) */
.road {
  margin-top:30px;
  height:80px;
  background:#222;
  position:relative;
  overflow:hidden;
  border-radius:10px;
}
.car {
  position:absolute;
  top:20px;
  font-size:35px;
  animation:drive 5s linear infinite;
  transform:scaleX(-1);
}
.home {
  position:absolute;
  right:10px;
  top:18px;
  font-size:35px;
}
@keyframes drive {
  0% {left:-80px;}
  100% {left:110%;}
}

/* SERVICES */
.section {padding:50px 20px;}
.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  width:200px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* CALENDAR */
.calendar-controls {
  margin:10px;
}

select {
  padding:8px;
  border-radius:8px;
}

.calendar {
  max-width:420px;
  margin:20px auto;
}

.weekdays, .days {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.weekdays div {
  font-weight:bold;
  font-size:12px;
  padding:5px;
}

.day {
  padding:12px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  background:#ddd;
}

/* STATES */
.available {background:#2ecc71; color:white;}
.full {background:#e74c3c; color:white;}
.closed {background:#777; color:white;}
.past {background:#bbb; pointer-events:none;}

/* TIME BOX */
#timesBox {
  display:none;
  max-width:300px;
  margin:auto;
}

.time {
  padding:10px;
  margin:5px;
  border-radius:8px;
  background:#e74c3c;
  color:white;
}
.time.active {
  background:#2ecc71;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>A.D Nails 💅</h1>
<div class="since">Since 2020</div>
<a class="btn" href="https://wa.me/35699758628">Book on WhatsApp</a>

<div class="road">
  <div class="car">🚗</div>
  <div class="home">🏠</div>
</div>
</header>

<div class="section">
<h2>💅 Booking Calendar (3 Months)</h2>

<div class="calendar-controls">
<select id="monthSelect" onchange="renderCalendar()">
  <option value="3">April</option>
  <option value="4">May</option>
  <option value="5">June</option>
</select>
</div>

<div class="calendar">
  <div class="weekdays">
    <div>Mon</div><div>Tue</div><div>Wed</div>
    <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
  </div>
  <div id="days" class="days"></div>
</div>

<div id="timesBox">
<h3 id="selectedDate"></h3>
<div id="times"></div>
</div>
</div>

<script>
let timesList = ["08:00","10:00","12:00","14:00","16:00"];

function getMonthData(monthIndex){
  let today = new Date();
  let data = {};

  for(let i=0;i<90;i++){
    let d = new Date();
    d.setDate(today.getDate()+i);

    if(d.getMonth() !== monthIndex) continue;

    let day = d.getDay();

    if(day === 0) continue; // Sunday closed

    // 1 random slot per day available
    if(Math.random() > 0.5){
      data[d.toDateString()] = true;
    }
  }

  return data;
}

let availability = {};

function renderCalendar(){
  let month = parseInt(document.getElementById("monthSelect").value);
  availability = getMonthData(month);

  let container = document.getElementById("days");
  container.innerHTML = "";

  let today = new Date();

  for(let i=0;i<90;i++){
    let d = new Date();
    d.setDate(today.getDate()+i);

    if(d.getMonth() !== month) continue;

    let div = document.createElement("div");
    div.className = "day";
    div.innerText = d.getDate();

    let day = d.getDay();
    let isAvailable = availability[d.toDateString()];

    if(d < new Date().setHours(0,0,0,0)){
      div.classList.add("past");
    }
    else if(day === 0){
      div.classList.add("closed");
    }
    else if(isAvailable){
      div.classList.add("available");
      div.onclick = () => openTimes(d.toDateString());
    }
    else {
      div.classList.add("full");
    }

    container.appendChild(div);
  }
}

function openTimes(date){
  document.getElementById("timesBox").style.display="block";
  document.getElementById("selectedDate").innerText=date;

  let box = document.getElementById("times");
  box.innerHTML="";

  let activeTime = timesList[Math.floor(Math.random()*timesList.length)];

  timesList.forEach(t=>{
    let div = document.createElement("div");
    div.className="time";

    if(t === activeTime){
      div.classList.add("active");
      div.innerText="🟢 "+t;

      div.onclick=()=>{
        window.open(
          "https://wa.me/35699758628?text=" +
          encodeURIComponent("Booking "+date+" at "+t)
        );
      };
    } else {
      div.innerText="🔴 "+t;
    }

    box.appendChild(div);
  });
}

renderCalendar();
</script>

</body>
</html>
