<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A.D Nails Malta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #ffe6f0, #ffffff);
      color: #333;
      text-align: center;
    }

    header {
      padding: 70px 20px;
      background: linear-gradient(180deg, #ffb6d5, #ffe6f0);
    }

    h1 {
      margin: 0;
      font-size: 44px;
      color: #b30059;
    }

    .subtitle {
      font-size: 18px;
      margin-top: 10px;
      color: #444;
    }

    .badge {
      display: inline-block;
      margin-top: 15px;
      padding: 6px 12px;
      background: #000;
      color: #fff;
      border-radius: 20px;
      font-size: 12px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 22px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
    }

    .card {
      background: white;
      margin: 12px auto;
      padding: 18px;
      max-width: 420px;
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      max-width: 800px;
      margin: auto;
    }

    footer {
      padding: 30px;
      background: #fff;
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>
