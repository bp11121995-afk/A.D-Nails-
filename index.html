<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.D Nails Malta</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fafafa;
  text-align:center;
}

/* HEADER */
header {
  padding:30px;
  background:#ffe0ef;
}

/* MONTH SWITCH */
#monthSelector {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.monthBtn {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ddd;
}

.monthBtn.active {
  background:#b30059;
  color:white;
}

/* WEEK HEADER */
.weekdays {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  max-width:420px;
  margin:auto;
  font-size:12px;
  font-weight:bold;
  color:#666;
}

/* CALENDAR */
#calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  max-width:420px;
  margin:auto;
  padding:10px;
}

.day {
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  font-weight:bold;
  color:white;
  cursor:pointer;
}

.empty {background:transparent;}
.free {background:#3498db;}
.busy {background:#e74c3c;}
.past {background:#333; cursor:not-allowed;}

/* TIMES */
#timesSection {
  display:none;
  padding:20px;
}

.time {
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  max-width:260px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>A.D Nails 💅</h1>
</header>

<!-- MONTH SELECT -->
<div id="monthSelector"></div>

<!-- WEEK DAYS -->
<div class="weekdays">
  <div>Mon</div><div>Tue</div><div>Wed</div>
  <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
</div>

<!-- CALENDAR -->
<div id="calendar"></div>

<!-- TIMES -->
<div id="timesSection">
  <h2 id="selectedDate"></h2>
  <div id="times"></div>
  <button onclick="back()">⬅ Back</button>
</div>

<script>

const months = ["April","May","June"];
let currentMonth = "April";

const calendar = document.getElementById("calendar");
const monthSelector = document.getElementById("monthSelector");
const timesSection = document.getElementById("timesSection");
const timesDiv = document.getElementById("times");
const selectedDate = document.getElementById("selectedDate");

let bookings = {};

// 5 REAL slots
const slots = [
  "08:00 - 10:00",
  "10:00 - 12:00",
  "12:00 - 14:00",
  "14:00 - 16:00",
  "16:00 - 18:00"
];

// random availability per day
function randomBusy() {
  return Math.random() < 0.35;
}

// MONTH BUTTONS
function createMonthButtons() {
  months.forEach(m => {
    let btn = document.createElement("button");
    btn.innerText = m;
    btn.className = "monthBtn";
    if (m === currentMonth) btn.classList.add("active");

    btn.onclick = () => {
      currentMonth = m;
      updateMonths();
    };

    monthSelector.appendChild(btn);
  });
}

// CALENDAR
function updateMonths() {

  document.querySelectorAll(".monthBtn").forEach(b => {
    b.classList.remove("active");
    if (b.innerText === currentMonth) b.classList.add("active");
  });

  calendar.innerHTML = "";

  let today = new Date();
  let year = 2026;

  for (let i = 1; i <= 30; i++) {

    let key = currentMonth + "-" + i;

    let dateObj = new Date(`${currentMonth} ${i}, ${year}`);

    let div = document.createElement("div");
    div.className = "day";
    div.innerText = i;

    // PAST DAYS
    if (dateObj < today) {
      div.classList.add("past");
      div.innerText = "X";
      div.style.cursor = "not-allowed";
    }
    else {

      let booked = bookings[key] ? bookings[key].length : 0;
      let busy = randomBusy();

      if (booked >= slots.length || busy) {
        div.classList.add("busy");
      } else {
        div.classList.add("free");
        div.onclick = () => openDay(key);
      }
    }

    calendar.appendChild(div);
  }
}

// OPEN DAY
function openDay(key) {

  calendar.style.display = "none";
  monthSelector.style.display = "none";
  timesSection.style.display = "block";

  selectedDate.innerText = key;

  if (!bookings[key]) bookings[key] = [];

  timesDiv.innerHTML = "";

  slots.forEach(slot => {

    let div = document.createElement("div");

    let booked = bookings[key].includes(slot);

    div.className = "time";
    div.style.background = booked ? "#e74c3c" : "#2ecc71";
    div.innerText = booked ? "❌ " + slot : "🟢 " + slot;

    if (!booked) {
      div.onclick = () => {
        bookings[key].push(slot);
        openDay(key);
      };
    }

    timesDiv.appendChild(div);
  });
}

function back() {
  calendar.style.display = "grid";
  monthSelector.style.display = "flex";
  timesSection.style.display = "none";
}

// INIT
createMonthButtons();
updateMonths();

</script>

</body>
</html>
