<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.D Nails Malta</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
}

header {
  padding:40px;
  background:#ffe0ef;
}

#notice {
  background:black;
  color:white;
  padding:10px;
  font-size:14px;
}

#months {
  padding:20px;
}

.month {
  margin-top:30px;
}

.month-title {
  font-size:22px;
  color:#b30059;
}

.calendar {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  max-width:420px;
  margin:auto;
}

.day {
  width:55px;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.free {background:#3498db;}
.full {background:#e74c3c;}

#timesSection {
  display:none;
  padding:20px;
}

.time {
  padding:12px;
  margin:6px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  max-width:260px;
  margin-left:auto;
  margin-right:auto;
}
</style>
</head>

<body>

<header>
  <h1>A.D Nails 💅</h1>
</header>

<div id="notice">Loading availability...</div>

<div id="months"></div>

<div id="timesSection">
  <h2 id="selectedDate"></h2>
  <div id="times"></div>
  <button onclick="back()">⬅ Back</button>
</div>

<script>

const monthsEl = document.getElementById("months");
const timesSection = document.getElementById("timesSection");
const timesEl = document.getElementById("times");
const selectedDate = document.getElementById("selectedDate");
const notice = document.getElementById("notice");

const months = ["April","May","June"];

const slots = [
  "08:00 - 10:00",
  "10:00 - 12:00",
  "12:00 - 14:00",
  "14:00 - 16:00",
  "16:00 - 18:00"
];

let bookings = {};

// ------------------- WHATSAPP -------------------
function whatsappLink(dateKey, slot) {
  let msg = `Hi, I want to book A.D Nails 💅%0ADate: ${dateKey}%0ATime: ${slot}`;
  return `https://wa.me/35699758628?text=${msg}`;
}

// ------------------- WEEK SYSTEM -------------------
function updateWeeklyNotice() {

  let today = new Date();
  let day = today.getDay();

  let monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));

  let sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);

  let availableDays = 0;

  months.forEach(month => {
    for (let i = 1; i <= 30; i++) {

      let key = month + "-" + i;
      let dateObj = new Date(`2026 ${month} ${i}`);

      if (dateObj >= monday && dateObj <= sunday) {

        let bookedCount = bookings[key] ? bookings[key].length : 0;

        if (bookedCount < slots.length) {
          availableDays++;
        }
      }
    }
  });

  if (availableDays <= 3) {
    notice.innerText = "⚠️ Only 3 days left this week!";
    notice.style.background = "red";
  } else {
    notice.innerText = "✅ Good availability this week";
    notice.style.background = "black";
  }
}

// ------------------- CALENDAR -------------------
function createCalendar() {

  months.forEach(month => {

    let box = document.createElement("div");
    box.className = "month";

    let title = document.createElement("div");
    title.className = "month-title";
    title.innerText = month;

    let cal = document.createElement("div");
    cal.className = "calendar";

    for (let i = 1; i <= 30; i++) {

      let key = month + "-" + i;

      let div = document.createElement("div");
      div.className = "day";
      div.innerText = i;

      let bookedCount = bookings[key] ? bookings[key].length : 0;

      if (bookedCount >= slots.length) {
        div.classList.add("full");
      } else {
        div.classList.add("free");
        div.onclick = () => openDay(key);
      }

      cal.appendChild(div);
    }

    box.appendChild(title);
    box.appendChild(cal);
    monthsEl.appendChild(box);
  });
}

// ------------------- OPEN DAY -------------------
function openDay(key) {

  monthsEl.style.display = "none";
  timesSection.style.display = "block";

  selectedDate.innerText = key;

  if (!bookings[key]) bookings[key] = [];

  timesEl.innerHTML = "";

  slots.forEach(slot => {

    let div = document.createElement("div");

    let booked = bookings[key].includes(slot);

    div.className = "time";
    div.style.background = booked ? "#e74c3c" : "#2ecc71";
    div.innerText = booked ? "❌ " + slot : "🟢 " + slot;

    if (!booked) {
      div.onclick = () => {
        bookings[key].push(slot);

        // WhatsApp AUTO OPEN
        window.open(whatsappLink(key, slot), "_blank");

        updateWeeklyNotice();
        openDay(key);
      };
    }

    timesEl.appendChild(div);
  });
}

function back() {
  monthsEl.style.display = "block";
  timesSection.style.display = "none";
}

// INIT
createCalendar();
updateWeeklyNotice();

</script>

</body>
</html>
