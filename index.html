<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.D Nails Malta</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#fff;
  text-align:center;
}

/* HEADER */
header {
  padding:60px 20px;
  background:linear-gradient(180deg,#ffb6d5,#ffe6f0);
}

h1 {color:#b30059;margin:0;}
.since {font-size:14px;}
.btn {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:#25D366;
  color:white;
  border-radius:10px;
  text-decoration:none;
}

/* CALENDAR */
.calendar {
  max-width:900px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.slot {
  padding:15px;
  border-radius:10px;
  color:white;
  font-weight:bold;
}

.available { background:#2ecc71; cursor:pointer;}
.full { background:#e74c3c; }
.closed { background:#555; }

/* FILTER BUTTON */
.filter-btn {
  margin-top:20px;
  padding:10px 18px;
  border:none;
  background:#000;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>A.D Nails 💅</h1>
  <div class="since">Since 2020</div>
  <a class="btn" href="https://wa.me/35699758628">Book on WhatsApp</a>
  <div>📞 +356 99 75 86 28</div>
</header>

<h2>📅 Booking Calendar</h2>

<button class="filter-btn" onclick="toggleAvailable()">Show Only Available Dates</button>

<div class="calendar" id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
let showOnlyAvailable = false;

function generateCalendar() {
  calendar.innerHTML = "";
  let today = new Date();

  for (let i = 0; i < 60; i++) {
    let date = new Date();
    date.setDate(today.getDate() + i);

    let day = date.getDay(); // 0 = Sunday
    let textDate = date.toDateString();

    let div = document.createElement("div");
    div.classList.add("slot");

    // Sunday CLOSED
    if (day === 0) {
      div.classList.add("closed");
      div.innerHTML = `⚫ CLOSED<br>${textDate}`;
    }
    // Available slots: Mon(1), Wed(3), Fri(5)
    else if (day === 1 || day === 3 || day === 5) {
      div.classList.add("available");
      div.innerHTML = `🟢 AVAILABLE<br>${textDate}<br>08:00`;

      div.onclick = () => {
        window.open("https://wa.me/35699758628?text=Hi I want to book "+textDate+" at 8am");
      };
    }
    // Everything else FULL
    else {
      div.classList.add("full");
      div.innerHTML = `🔴 FULL<br>${textDate}`;
    }

    // FILTER LOGIC
    if (showOnlyAvailable) {
      if (div.classList.contains("available")) {
        calendar.appendChild(div);
      }
    } else {
      calendar.appendChild(div);
    }
  }
}

function toggleAvailable() {
  showOnlyAvailable = !showOnlyAvailable;
  generateCalendar();
}

generateCalendar();
</script>

</body>
</html>
